<script>
        // Simple Interaction Logic for Diners Selector
        const buttons = document.querySelectorAll('.comensales-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => {
                    b.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg');
                btn.classList.remove('text-on-surface-variant');
            });
        });

        // Micro-interaction for radio buttons
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Flash effect on selection
                const parent = this.closest('label');
                parent.classList.add('ring-2', 'ring-primary/20');
                setTimeout(() => parent.classList.remove('ring-2', 'ring-primary/20'), 400);
            });
        });
    </script>
