<rms-page-header
  [title]="'Nuevo Producto'"
  [subtitle]="'Agrega un nuevo producto al catalogo'"
  [showBackButton]="true"
  (onBack)="router.navigateByUrl('/admin/products')"
/>

<form [formGroup]="form" (ngSubmit)="submit()" class="product-form">
  <div class="form-row">
    <rms-input
      [label]="'Nombre del producto'"
      [placeholder]="'Ej: Hamburguesa clasica'"
      formControlName="name"
    />
  </div>

  <div class="form-row">
    <rms-select
      [label]="'Categoria'"
      [optionsList]="categoryOptions()"
      [placeholder]="'Selecciona una categoria'"
      formControlName="categoryId"
      (onChange)="onCategoryChange($event)"
    />

    <rms-select
      [label]="'Area de preparacion'"
      [optionsList]="areaOptions()"
      [placeholder]="'Selecciona un area'"
      formControlName="areaId"
      (onChange)="onAreaChange($event)"
    />
  </div>

  <div class="form-row">
    <rms-input
      [label]="'Precio base'"
      [placeholder]="'0.00'"
      [type]="'number'"
      formControlName="basePrice"
    />

    <div class="checkbox-field">
      <p-checkbox
        formControlName="hasOptions"
        [binary]="true"
        inputId="hasOptions"
      />
      <label for="hasOptions">Acepta personalizaciones</label>
    </div>
  </div>

  <rms-textarea
    [label]="'Descripcion'"
    [placeholder]="'Describe el producto...'"
    formControlName="description"
  />

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }
  @if (successMessage()) {
    <p class="success-message">{{ successMessage() }}</p>
  }

  <div class="form-actions">
    <rms-button
      [label]="'Cancelar'"
      [severity]="'secondary'"
      [outlined]="true"
      routerLink="/admin/products"
    />
    <rms-button
      [label]="loading() ? 'Guardando...' : 'Guardar Producto'"
      [severity]="'primary'"
      [type]="'submit'"
      [disabled]="form.invalid || loading()"
    />
  </div>
</form>
