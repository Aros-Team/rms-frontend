<div class="flex flex-col p-4 md:p-6 min-w-0 min-h-0">
  <!-- Header -->
  <div class="flex items-center justify-between gap-4 mb-2 md:mb-4 min-w-0 flex-shrink-0">
    <h1 class="text-xl md:text-2xl font-bold text-surface-900 dark:text-surface-0 break-words min-w-0">{{ title }}</h1>
    <p-button
      icon="pi pi-plus"
      class="btn-icon-text-sm"
      pTooltip="Crear mesa"
      tooltipPosition="bottom"
      (onClick)="showCreationModal()"
    ></p-button>
  </div>

  <p class="text-surface-600 dark:text-surface-400 mb-2 md:mb-4 text-sm">{{ description }}</p>

  <div class="flex-1 min-h-0">
    <p-table [value]="tables()" [loading]="loading()" [paginator]="true" [rows]="10"
      [scrollable]="true" scrollHeight="flex" responsiveLayout="scroll" styleClass="h-full">
    <ng-template pTemplate="header">
      <tr>
        <th class="text-xs md:text-sm">#</th>
        <th class="text-xs md:text-sm">Cap.</th>
        <th class="text-xs md:text-sm hidden sm:table-cell">Estado</th>
        <th class="text-center text-xs md:text-sm">Acc.</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-table>
      <tr>
        <td class="font-medium">{{ table.tableNumber }}</td>
        <td>
          <div class="flex items-center gap-1">
            <i class="pi pi-users text-xs text-surface-500"></i>
            <span>{{ table.capacity }}</span>
          </div>
        </td>
        <td class="hidden sm:table-cell">
          <span [class]="getStatusClass(table.status) + ' px-2 py-1 rounded text-xs font-medium'">
            {{ getStatusLabel(table.status) }}
          </span>
        </td>
        <td>
          <div class="flex items-center justify-center">
            <p-button 
              icon="pi pi-pencil" 
              [text]="true"
              severity="warn"
              size="small"
              (onClick)="showEditModal(table)"
            ></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center">No hay mesas configuradas</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [modal]="true"
  [visible]="modalIsOpen()"
  (visibleChange)="modalIsOpen.set($event)"
  [header]="modalMode() === 'edit' ? 'Editar Mesa' : 'Crear Mesa'"
  [style]="{width: '90vw', maxWidth: '400px'}"
>
  <form [formGroup]="tableForm" (ngSubmit)="saveTable()">
    <div class="flex flex-col gap-4">
      <p-iftalabel>
        <input
          pInputText
          id="tableNumber"
          type="number"
          class="w-full"
          formControlName="tableNumber"
          placeholder="Número de mesa"
        />
        <label for="tableNumber">Número de mesa</label>
      </p-iftalabel>

      <p-iftalabel>
        <input
          pInputText
          id="capacity"
          type="number"
          class="w-full"
          formControlName="capacity"
          placeholder="Capacidad"
        />
        <label for="capacity">Capacidad (personas)</label>
      </p-iftalabel>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" (onClick)="closeModal()"></p-button>
    <p-button label="Guardar" (onClick)="saveTable()" [disabled]="tableForm.invalid"></p-button>
  </ng-template>
</p-dialog>
