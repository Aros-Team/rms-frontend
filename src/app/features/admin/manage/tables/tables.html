<div class="h-full flex flex-col p-6 min-w-0">
  <!-- Header -->
  <div class="flex items-center gap-4 mb-4 min-w-0">
    <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0 break-words min-w-0">{{ title }}</h1>
  </div>

  <p class="text-surface-600 dark:text-surface-400 mb-4">{{ description }}</p>

  <div class="flex justify-end mb-4">
    <p-button
      icon="pi pi-plus"
      label="Nueva mesa"
      class="btn-icon-only-sm"
      pTooltip="Crear mesa"
      tooltipPosition="bottom"
      (onClick)="showCreationModal()"
    ></p-button>
  </div>

  <p-table [value]="tables" [loading]="loading" [paginator]="true" [rows]="10"
    [scrollable]="true" scrollWidth="flex" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Número</th>
        <th>Capacidad</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-table>
      <tr>
        <td>Mesa {{ table.tableNumber }}</td>
        <td>{{ table.capacity }} personas</td>
        <td>
          <span [class]="getStatusClass(table.status) + ' px-2 py-1 rounded text-xs font-medium'">
            {{ getStatusLabel(table.status) }}
          </span>
        </td>
        <td>
          <div class="flex flex-wrap gap-2 items-center">
            <p-button 
              icon="pi pi-pencil" 
              [text]="true"
              (onClick)="showEditModal(table)"
            ></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center">No hay mesas configuradas</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [modal]="true"
  [(visible)]="modalIsOpen"
  [header]="modalMode === 'edit' ? 'Editar Mesa' : 'Crear Mesa'"
  [style]="{width: '90vw', maxWidth: '400px'}"
>
  <form [formGroup]="tableForm" (ngSubmit)="saveTable()">
    <div class="flex flex-col gap-4">
      <p-iftalabel>
        <input
          pInputText
          id="tableNumber"
          type="number"
          class="w-full"
          formControlName="tableNumber"
          placeholder="Número de mesa"
        />
        <label for="tableNumber">Número de mesa</label>
      </p-iftalabel>

      <p-iftalabel>
        <input
          pInputText
          id="capacity"
          type="number"
          class="w-full"
          formControlName="capacity"
          placeholder="Capacidad"
        />
        <label for="capacity">Capacidad (personas)</label>
      </p-iftalabel>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" (onClick)="closeModal()"></p-button>
    <p-button label="Guardar" (onClick)="saveTable()" [disabled]="tableForm.invalid"></p-button>
  </ng-template>
</p-dialog>
