<div class="flex flex-col p-6 h-full pb-40">
  <!-- Header -->
  <div class="flex items-center gap-4 mb-6">
  </div>

  <div>
    <p-table
      #dt1
      [value]="users"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [tableStyle]="{ 'background-color': 'unset' }"
      [paginator]="true"
      [globalFilterFields]="['document', 'name', 'email']"
      [scrollable]="true"
      scrollWidth="flex"
      responsiveLayout="scroll"
      stripedRows
      showGridlines
    >
      <ng-template #caption>
        <div class="flex flex-wrap gap-2">
          <p-button label="Limpiar" [outlined]="true" icon="pi pi-filter-slash" />
          <p-iconfield iconPosition="left" class="flex-1 min-w-[200px]">
            <p-inputicon>
              <i class="pi pi-search"></i>
            </p-inputicon>
            <input
              pInputText
              type="text"
              (input)="dt1.filterGlobal($event.target.value, 'contains')"
              placeholder="Buscar"
            />
          </p-iconfield>
          <p-button icon="pi pi-plus" class="btn-icon-only-sm" pTooltip="Crear usuario" tooltipPosition="bottom" (click)="showCreationModal()" />
        </div>
      </ng-template>
      <ng-template #header>
        <tr>
          <th>
            <div class="flex items-center justify-between">Documento</div>
          </th>
          <th>
            <div class="flex items-center justify-between">Nombre</div>
          </th>
          <th>
            <div class="flex items-center justify-between">Correo</div>
          </th>
          <th>Celular</th>
          <th>Direccion</th>
          <th>Opciones</th>
        </tr>
      </ng-template>
      <ng-template #body let-user>
        <tr>
          <td>{{ user.document }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phone }}</td>
          <td>{{ user.address }}</td>
          <td>
            <div class="flex gap-1 items-center">
              <p-button
                severity="warn"
                icon="pi pi-pencil"
                label="Editar"
                size="small"
                [text]="true"
                class="btn-icon-only-sm"
                [disabled]="true"
                pTooltip="Próximamente"
                tooltipPosition="top"
              ></p-button>
              <p-button
                severity="danger"
                icon="pi pi-trash"
                label="Eliminar"
                size="small"
                [text]="true"
                class="btn-icon-only-sm"
                [disabled]="true"
                pTooltip="Próximamente"
                tooltipPosition="top"
              ></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog
  header="{{ editing ? 'Editar Usuario' : 'Crear Usuario' }}"
  [modal]="true"
  [(visible)]="creationModalVisible"
  draggable="false"
  [style]="{ width: '90vw', maxWidth: '500px', padding: '2', 'z-index': '400000' }"
  appendTo="body"
>
  <div class="p-4">
    @if (editing) {
    <div class="text-center py-8">
      <i class="pi pi-clock text-5xl text-color-secondary mb-4 block"></i>
      <p class="text-lg font-semibold text-color">Funcionalidad próximamente disponible</p>
      <p class="text-sm text-color-secondary mt-2">La edición de usuarios estará disponible pronto</p>
    </div>
    } @else {
    <span class="p-text-secondary block mb-8">Crea un nuevo usuario</span>
    }

    <form action="" [formGroup]="userForm">
      <div class="flex items-center gap-4 mb-4">
        <p-iftalabel class="flex-auto w-full">
          <input
            pInputText
            id="create.document"
            class="flex-auto w-full"
            autocomplete="off"
            formControlName="document"
            placeholder="Numero de documento del usuario"
            (blur)="userForm.get('document')?.markAsTouched()"
          />
          <label for="create.document" class="font-semibold w-50">Documento</label>
          <form-validation field="document"></form-validation>
        </p-iftalabel>
      </div>
      <div class="flex items-center gap-4 mb-4">
        <p-iftalabel class="flex-auto w-full">
          <input
            pInputText
            id="create.name"
            class="flex-auto w-full"
            autocomplete="off"
            formControlName="name"
            placeholder="Nombre completo del usuario"
            (blur)="userForm.get('name')?.markAsTouched()"
          />
          <label for="create.name" class="font-semibold w-50">Nombre</label>
          <form-validation field="name"></form-validation>
        </p-iftalabel>
      </div>
      <div class="flex items-center gap-4 mb-4">
        <p-iftalabel class="flex-auto w-full">
          <input
            pInputText
            type="email"
            id="create.email"
            class="flex-auto w-full"
            autocomplete="off"
            formControlName="email"
            placeholder="correo electronico del usuario"
            (blur)="userForm.get('email')?.markAsTouched()"
          />
          <label for="create.email" class="font-semibold w-50">Correo electronico</label>
          <form-validation field="email"></form-validation>
        </p-iftalabel>
      </div>
      <div class="flex items-center gap-4 mb-4">
        <p-iftalabel class="flex-auto w-full">
          <input
            pInputText
            id="create.address"
            class="flex-auto w-full"
            autocomplete="off"
            formControlName="address"
            placeholder="direccion de residencia del usuario"
            (blur)="userForm.get('address')?.markAsTouched()"
          />
          <label for="create.address" class="font-semibold w-50">Direccion</label>
          <form-validation field="address"></form-validation>
        </p-iftalabel>
      </div>
      <div class="flex items-center gap-4 mb-4">
        <p-iftalabel class="flex-auto w-full">
          <input
            pInputText
            id="create.phone"
            class="flex-auto w-full"
            autocomplete="off"
            formControlName="phone"
            placeholder="numero de contacto del usuario"
            (blur)="userForm.get('phone')?.markAsTouched()"
          />
          <label for="create.phone" class="font-semibold w-50">N# Celular</label>
          <form-validation field="phone"></form-validation>
        </p-iftalabel>
      </div>
    </form>

    <div class="flex justify-start gap-2 mt-8">
      @if (!editing) {
      <p-button icon="pi pi-save" label="Crear" (click)="createUser()" />
      }
      <p-button icon="pi pi-ban" label="Cerrar" severity="secondary" (click)="closeModals()" />
    </div>
  </div>
</p-dialog>
