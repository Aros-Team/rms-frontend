<div class="flex flex-col p-4 md:p-6 min-h-0">
  <!-- Header -->
  <div class="flex items-center gap-4 mb-4 flex-shrink-0">
  </div>

  <div class="flex-1 min-h-0">
    <p-table
      #dt1
      [value]="users"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [tableStyle]="{ 'background-color': 'unset' }"
      [globalFilterFields]="['document', 'name', 'email']"
      [scrollable]="true"
      scrollHeight="flex"
      responsiveLayout="scroll"
      stripedRows
      showGridlines
      styleClass="h-full"
    >
      <ng-template #caption>
        <div class="flex flex-col sm:flex-row gap-2">
          <p-iconfield iconPosition="left" class="w-full lg:w-80">
            <p-inputicon>
              <i class="pi pi-search"></i>
            </p-inputicon>
            <input
              pInputText
              type="text"
              class="w-full"
              (input)="dt1.filterGlobal($event.target.value, 'contains')"
              placeholder="Buscar por documento, nombre o correo..."
            />
          </p-iconfield>
          <div class="flex gap-2">
            <p-button label="Limpiar" [outlined]="true" icon="pi pi-filter-slash" />
            <p-button icon="pi pi-plus" class="btn-icon-text-sm" pTooltip="Crear usuario" tooltipPosition="bottom" (click)="showCreationModal()" />
          </div>
        </div>
      </ng-template>
      <ng-template #header>
        <tr>
          <th class="text-xs md:text-sm">Doc.</th>
          <th class="text-xs md:text-sm">Nombre</th>
          <th class="text-xs md:text-sm hidden lg:table-cell">Correo</th>
          <th class="text-xs md:text-sm hidden md:table-cell">Tel.</th>
          <th class="text-xs md:text-sm hidden xl:table-cell">Dirección</th>
          <th class="text-center text-xs md:text-sm">Acc.</th>
        </tr>
      </ng-template>
      <ng-template #body let-user>
        <tr>
          <td class="font-mono text-xs">{{ user.document }}</td>
          <td class="font-medium">{{ user.name }}</td>
          <td class="hidden lg:table-cell text-sm truncate max-w-[150px]">{{ user.email }}</td>
          <td class="hidden md:table-cell">{{ user.phone }}</td>
          <td class="hidden xl:table-cell text-sm truncate max-w-[120px]">{{ user.address }}</td>
          <td>
            <div class="flex gap-1 items-center justify-center">
              <p-button
                severity="warn"
                icon="pi pi-pencil"
                size="small"
                [text]="true"
                class="btn-icon-only-sm"
                [disabled]="true"
                pTooltip="Próximamente"
                tooltipPosition="top"
              ></p-button>
              <p-button
                severity="danger"
                icon="pi pi-trash"
                size="small"
                [text]="true"
                class="btn-icon-only-sm"
                [disabled]="true"
                pTooltip="Próximamente"
                tooltipPosition="top"
              ></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog
  header="{{ editing ? 'Editar Usuario' : 'Crear Usuario' }}"
  [modal]="true"
  [(visible)]="creationModalVisible"
  draggable="false"
  [style]="{ width: '90vw', maxWidth: '500px', padding: '2', 'z-index': '400000' }"
  appendTo="body"
>
  <div class="p-4">
    @if (editing) {
    <div class="text-center py-8">
      <i class="pi pi-clock text-5xl text-color-secondary mb-4 block"></i>
      <p class="text-lg font-semibold text-color">Funcionalidad próximamente disponible</p>
      <p class="text-sm text-color-secondary mt-2">La edición de usuarios estará disponible pronto</p>
    </div>
    } @else {
    <span class="p-text-secondary block mb-8">Crea un nuevo usuario</span>
    }

    <form action="" [formGroup]="userForm" class="flex flex-col gap-4">
      <p-iftalabel class="w-full">
        <input
          pInputText
          id="create.document"
          class="w-full"
          autocomplete="off"
          formControlName="document"
          placeholder="Numero de documento del usuario"
        />
        <label for="create.document">Documento *</label>
        <app-form-validation field="document"></app-form-validation>
      </p-iftalabel>
      <p-iftalabel class="w-full">
        <input
          pInputText
          id="create.name"
          class="w-full"
          autocomplete="off"
          formControlName="name"
          placeholder="Nombre completo del usuario"
        />
        <label for="create.name">Nombre *</label>
        <app-form-validation field="name"></app-form-validation>
      </p-iftalabel>
      <p-iftalabel class="w-full">
        <input
          pInputText
          type="email"
          id="create.email"
          class="w-full"
          autocomplete="off"
          formControlName="email"
          placeholder="correo electronico del usuario"
        />
        <label for="create.email">Correo electrónico *</label>
        <app-form-validation field="email"></app-form-validation>
      </p-iftalabel>
      <p-iftalabel class="w-full">
        <input
          pInputText
          id="create.address"
          class="w-full"
          autocomplete="off"
          formControlName="address"
          placeholder="direccion de residencia del usuario"
        />
        <label for="create.address">Dirección</label>
        <app-form-validation field="address"></app-form-validation>
      </p-iftalabel>
      <p-iftalabel class="w-full">
        <input
          pInputText
          id="create.phone"
          class="w-full"
          autocomplete="off"
          formControlName="phone"
          placeholder="numero de contacto del usuario"
        />
        <label for="create.phone">N# Celular</label>
        <app-form-validation field="phone"></app-form-validation>
      </p-iftalabel>
    </form>

    <div class="flex justify-start gap-2 mt-8">
      @if (!editing) {
      <p-button icon="pi pi-save" label="Crear" (click)="createUser()" />
      }
      <p-button icon="pi pi-ban" label="Cancelar" severity="secondary" (click)="closeModals()" />
    </div>
  </div>
</p-dialog>
