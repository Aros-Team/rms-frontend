<!-- Content area — switches inline based on activeTab -->
<div class="flex-1 min-h-0 overflow-hidden pb-24">
  @if (activeTab() === 'menu') {
    <app-combos-waiter />
  } @else if (activeTab() === 'carta') {
    <app-products />
  } @else if (activeTab() === 'pedidos') {
    <app-today-orders />
  }
</div>
