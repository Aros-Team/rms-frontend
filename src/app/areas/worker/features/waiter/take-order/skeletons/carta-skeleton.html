<div class="px-4 py-4">
  <!-- Search bar skeleton -->
  <p-skeleton width="100%" height="42px" styleClass="mb-4" borderRadius="12px" />

  <!-- Category tabs skeleton -->
  <div class="flex gap-2 mb-4 overflow-x-auto">
    <p-skeleton width="60px" height="32px" borderRadius="8px" />
    <p-skeleton width="80px" height="32px" borderRadius="8px" />
    <p-skeleton width="70px" height="32px" borderRadius="8px" />
    <p-skeleton width="90px" height="32px" borderRadius="8px" />
    <p-skeleton width="65px" height="32px" borderRadius="8px" />
  </div>

  <!-- Product cards grid skeleton -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    @for (_ of [1,2,3,4,5,6,7,8]; track $index) {
      <div class="bg-primary-contrast dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 overflow-hidden">
        <p-skeleton width="100%" height="128px" borderRadius="0" />
        <div class="p-3 flex flex-col gap-2">
          <p-skeleton width="80%" height="0.875rem" />
          <p-skeleton width="60%" height="0.75rem" />
          <div class="flex items-center justify-between mt-1">
            <p-skeleton width="50px" height="0.875rem" />
            <p-skeleton width="60px" height="0.75rem" />
          </div>
        </div>
      </div>
    }
  </div>
</div>
