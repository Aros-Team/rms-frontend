<div class="px-4 py-4">

  <!-- Loading -->
  @if (loading()) {
    <app-carta-skeleton />
  }

  @if (!loading()) {
    <!-- Error -->
    @if (error()) {
      <div class="mb-4 p-4 bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-700 rounded-xl flex items-center gap-3">
        <i class="pi pi-exclamation-circle text-red-700 dark:text-red-300"></i>
        <span class="text-red-700 dark:text-red-300 text-sm">{{ error() }}</span>
        <button class="ml-auto text-red-700 dark:text-red-300 hover:text-red-900" (click)="error.set(null)">
          <i class="pi pi-times"></i>
        </button>
      </div>
    }

    <!-- Search bar -->
    <p-iconfield iconPosition="left" class="mb-4">
      <p-inputicon><i class="pi pi-search"></i></p-inputicon>
      <input pInputText type="text" [(ngModel)]="searchQuery" placeholder="Buscar producto..." class="w-full" />
    </p-iconfield>

    <!-- Category tabs — wrap in rows, no scroll -->
    <div class="flex flex-wrap gap-2 mb-4">
      @for (cat of categories(); track cat) {
        <button
          class="px-2.5 py-1 rounded-md text-xs font-medium transition-colors"
          [class]="activeCategory() === cat
            ? 'bg-primary-500 text-slate-900'
            : 'bg-surface-100 dark:bg-surface-800 text-surface-600 dark:text-surface-400 hover:bg-surface-200 dark:hover:bg-surface-700'"
          (click)="selectCategory(cat)">
          {{ cat }}
        </button>
      }
    </div>

    <!-- Product cards grid -->
    @if (filteredProducts().length === 0) {
      <div class="text-center py-16 text-surface-500">
        <i class="pi pi-search text-4xl mb-3 block"></i>
        <p class="text-sm">No se encontraron productos</p>
      </div>
    }

    <div class="product-grid">
      @for (product of filteredProducts(); track product.id) {
        <button
          class="text-left bg-white dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 overflow-hidden hover:border-primary-400 transition-all group cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary-500"
          (click)="addProduct(product)">

          <!-- Product image -->
          <div class="product-card-image bg-surface-100 dark:bg-surface-700 flex items-center justify-center">
            @if (getThumbnailUrl(product.id); as thumbnailUrl) {
              <img
                [src]="thumbnailUrl"
                [alt]="product.name"
                class="group-hover:scale-105 transition-transform duration-300"
                loading="lazy"
                (error)="$any($event.target).src = defaultImage"
              />
            } @else {
              <div class="flex flex-col items-center gap-1 text-surface-400">
                <i class="pi pi-image text-2xl"></i>
                <span class="text-[10px]">Sin imagen</span>
              </div>
            }
          </div>

          <!-- Product info -->
          <div class="p-3 flex flex-col gap-1">
            <span class="font-semibold text-surface-800 dark:text-surface-100 text-sm group-hover:text-primary-700 dark:group-hover:text-primary-300 line-clamp-2">
              {{ product.name }}
            </span>
            @if (product.description) {
              <p class="text-xs text-surface-500 dark:text-surface-400 line-clamp-2">{{ product.description }}</p>
            }
            <div class="flex items-center justify-between mt-1">
              <span class="text-primary-700 dark:text-primary-300 font-bold text-sm">
                ${{ product.basePrice | number:'1.2-2' }}
              </span>
              <span class="text-[10px] text-surface-400 flex items-center gap-0.5">
                <i class="pi pi-plus-circle text-xs"></i>
                Agregar
              </span>
            </div>
          </div>
        </button>
      }
    </div>
  }
</div>

<!-- ══ SHARED OPTIONS MODAL ══ -->
@if (showOptionsModal() && pendingProduct()) {
  <app-product-options-modal
    [visible]="showOptionsModal()"
    [product]="pendingProduct()"
    [options]="modalOptions()"
    [loading]="modalOptionsLoading()"
    [error]="optionsError()"
    (confirm)="onConfirmOptions($event)"
    (dismiss)="closeModal()"
    (errorClear)="optionsError.set(null)"
  />
}
