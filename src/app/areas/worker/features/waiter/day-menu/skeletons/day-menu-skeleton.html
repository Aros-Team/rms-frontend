<div class="flex flex-col items-center w-full max-w-xl mx-auto p-6">
  <div class="w-full flex flex-col gap-6">

    <!-- Title area -->
    <div class="text-center">
      <p-skeleton width="80px" height="0.75rem" styleClass="mx-auto mb-1" />
      <p-skeleton width="140px" height="1.75rem" styleClass="mx-auto" />
    </div>

    <!-- Card -->
    <div class="bg-primary-contrast dark:bg-surface-800 rounded-2xl border border-surface-200 dark:border-surface-700 overflow-hidden">
      <!-- Header -->
      <div class="bg-surface-100 dark:bg-surface-700 px-6 py-5 flex items-center gap-3">
        <p-skeleton shape="circle" size="2rem" />
        <div class="flex flex-col gap-1.5 flex-1 min-w-0">
          <p-skeleton width="60%" height="1.5rem" />
          <p-skeleton width="40%" height="0.875rem" />
        </div>
      </div>

      <!-- Options -->
      <div class="px-6 pt-5 pb-2">
        <div class="flex flex-col gap-4">
          <div>
            <p-skeleton width="70px" height="0.75rem" styleClass="mb-2" />
            <div class="flex flex-wrap gap-2">
              <p-skeleton width="60px" height="28px" borderRadius="14px" />
              <p-skeleton width="80px" height="28px" borderRadius="14px" />
              <p-skeleton width="70px" height="28px" borderRadius="14px" />
            </div>
          </div>
          <div>
            <p-skeleton width="90px" height="0.75rem" styleClass="mb-2" />
            <div class="flex flex-wrap gap-2">
              <p-skeleton width="70px" height="28px" borderRadius="14px" />
              <p-skeleton width="60px" height="28px" borderRadius="14px" />
              <p-skeleton width="90px" height="28px" borderRadius="14px" />
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 bg-surface-50 dark:bg-surface-900/50 border-t border-surface-200 dark:border-surface-700 flex items-center justify-between">
        <p-skeleton width="80px" height="1rem" />
        <p-skeleton width="120px" height="1.75rem" />
      </div>
    </div>

    <!-- Button -->
    <p-skeleton width="100%" height="52px" borderRadius="16px" />

  </div>
</div>
