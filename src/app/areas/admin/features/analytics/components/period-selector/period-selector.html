<div class="flex flex-wrap items-end gap-3 w-full md:w-auto" role="group" aria-label="Selector de periodo">
  <div class="flex flex-col gap-1 min-w-[7rem]">
    <label for="period-bucket" class="text-xs text-surface-600 dark:text-surface-400">Bucket</label>
    <p-select
      inputId="period-bucket"
      [options]="bucketOptions"
      optionLabel="label"
      optionValue="value"
      [ngModel]="bucket()"
      (ngModelChange)="onBucketChange($event)"
      appendTo="body"
      ariaLabel="Bucket de periodo" />
  </div>
  <div class="flex flex-col gap-1 min-w-[8rem]">
    <label for="period-from" class="text-xs text-surface-600 dark:text-surface-400">Desde</label>
    <input
      id="period-from"
      pInputText
      [ngModel]="from()"
      (ngModelChange)="onFromChange($event)"
      [placeholder]="placeholderExample()"
      [attr.aria-invalid]="!fromValid()" />
  </div>
  <div class="flex flex-col gap-1 min-w-[8rem]">
    <label for="period-to" class="text-xs text-surface-600 dark:text-surface-400">Hasta</label>
    <input
      id="period-to"
      pInputText
      [ngModel]="to()"
      (ngModelChange)="onToChange($event)"
      [placeholder]="placeholderExample()"
      [attr.aria-invalid]="!toValid()" />
  </div>
  <div class="flex gap-2">
    <p-button label="Aplicar" icon="pi pi-check" severity="secondary" (click)="apply()" [disabled]="!!errorMessage()" />
    <p-button label="Restablecer" icon="pi pi-refresh" severity="secondary" [outlined]="true" (click)="reset()" />
  </div>
  @if (errorMessage(); as msg) {
    <p-message severity="warn" [text]="msg" styleClass="basis-full" />
  }
</div>
