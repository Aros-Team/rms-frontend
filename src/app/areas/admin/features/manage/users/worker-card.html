<div class="border border-surface-200 dark:border-surface-700 rounded-xl bg-primary-contrast p-4 flex flex-col gap-3">
  <!-- Avatar + Name row -->
  <div class="flex items-center gap-3">
    <div
      class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg flex-shrink-0"
      [style.background-color]="avatarColor()"
    >
      {{ initials() }}
    </div>
    <div class="min-w-0 flex-1">
      <h3 class="font-medium text-surface-900 dark:text-surface-0 truncate">{{ user().name }}</h3>
      <p class="text-sm text-surface-500 truncate">{{ user().email }}</p>
    </div>
    <p-tag [value]="statusLabel()" [severity]="statusSeverity()" />
  </div>

  <!-- Info rows (only what matters) -->
  <div class="flex flex-col gap-2 text-sm">
    <div class="flex justify-between items-center">
      <span class="text-surface-500">Área</span>
      <span class="text-surface-700 dark:text-surface-300 font-medium">{{ areaName() }}</span>
    </div>
    <div class="flex justify-between items-center">
      <span class="text-surface-500">Horarios</span>
      <p-tag [value]="assignedScheduleCount() + ' asignados'" [severity]="assignedScheduleCount() > 0 ? 'info' : 'secondary'" />
    </div>
  </div>

  <!-- Actions -->
  <div class="flex gap-2 pt-2 border-t border-surface-100 dark:border-surface-700 flex-wrap">
    <p-button severity="info" icon="pi pi-calendar" pTooltip="Asignar horarios" tooltipPosition="top" size="small" styleClass="flex-1" (click)="onAssignSchedule()"></p-button>
    <p-button severity="warn" icon="pi pi-pencil" pTooltip="Editar usuario" tooltipPosition="top" size="small" styleClass="flex-1" (click)="onEdit()"></p-button>
    @if (user().status === 'PENDING') {
      <p-button severity="info" icon="pi pi-envelope" pTooltip="Reenviar invitación" tooltipPosition="top" size="small" styleClass="flex-1" (click)="onRetryEmail()"></p-button>
    }
    <p-button severity="info" icon="pi pi-history" pTooltip="Ver historial salarial" tooltipPosition="top" size="small" styleClass="flex-1" [routerLink]="['/admin/manage/users', user().id, 'salary-history']"></p-button>
  </div>
</div>
