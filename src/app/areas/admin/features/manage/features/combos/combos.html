<div class="flex flex-col p-4 md:p-6 min-w-0 min-h-0">
  <!-- Title area -->
  <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
    <div>
      <h1 class="text-xl md:text-2xl font-bold text-surface-900 dark:text-surface-0">Combos</h1>
      <p class="text-surface-600 dark:text-surface-400 mt-1 text-sm">Combinaciones especiales y menús</p>
    </div>
    <p-button icon="pi pi-plus" label="Nuevo combo" (onClick)="navigateToNew()" />
  </div>

  <!-- Content container -->
  <div class="flex-1 min-h-0 border border-surface-200 dark:border-surface-700 rounded-xl bg-primary-contrast overflow-hidden">
    @if (isLoading()) {
      <app-table-skeleton />
    } @else {
      <p-table [value]="combos()">
        <ng-template pTemplate="header">
          <tr>
            <th>Nombre</th>
            <th>Precio Base</th>
            <th>Horario</th>
            <th>Activo</th>
            <th>Acciones</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-combo>
          <tr>
            <td>{{ combo.name }}</td>
            <td>{{ combo.basePrice | currency:'USD':'symbol':'1.0-2' }}</td>
            <td>{{ scheduleSummary(combo.schedule) }}</td>
            <td>
              <!-- TODO-10b: wire active toggle when backend endpoint is available -->
              <p-toggleswitch [ngModel]="combo.active" [disabled]="true" />
            </td>
            <td>
              <div class="flex gap-1">
                <p-button icon="pi pi-pencil" severity="secondary" (onClick)="navigateToEdit(combo.id)" pTooltip="Editar" />
                <p-button icon="pi pi-history" severity="secondary" (onClick)="navigateToHistory(combo.id)" pTooltip="Historial" />
                <p-button icon="pi pi-calculator" severity="secondary" (onClick)="suggestPrice()" pTooltip="Precio sugerido" />
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="text-center text-surface-500 py-8">
              No hay combos registrados
            </td>
          </tr>
        </ng-template>
      </p-table>
    }
  </div>
</div>
