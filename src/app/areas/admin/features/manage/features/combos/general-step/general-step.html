<div class="flex flex-col gap-5 max-w-lg">
  @if (isLoading()) {
    <div class="flex flex-col gap-4" data-testid="loading-skeleton">
      <p-skeleton width="100%" height="2.25rem" borderRadius="8px" />
      <p-skeleton width="100%" height="4rem" borderRadius="8px" />
      <p-skeleton width="100%" height="2.25rem" borderRadius="8px" />
      <p-skeleton width="100%" height="2.25rem" borderRadius="8px" />
      <p-skeleton width="100%" height="2.25rem" borderRadius="8px" />
      <p-skeleton width="60%" height="2.25rem" borderRadius="8px" />
    </div>
  } @else {
    <!-- Nombre del combo -->
    <div class="flex flex-col gap-1">
      <label for="name" class="text-sm font-medium text-surface-700 dark:text-surface-300">
        Nombre del combo
      </label>
      <input
        pInputText
        id="name"
        [ngModel]="wizardData().name"
        (ngModelChange)="onNameChange($event)"
        data-testid="name-input"
      />
    </div>

    <!-- Descripción -->
    <div class="flex flex-col gap-1">
      <label for="description" class="text-sm font-medium text-surface-700 dark:text-surface-300">
        Descripción
      </label>
      <textarea
        pTextarea
        id="description"
        rows="3"
        [ngModel]="wizardData().description"
        (ngModelChange)="onDescriptionChange($event)"
        data-testid="description-input"
      ></textarea>
    </div>

    <!-- Horario requerido -->
    <div class="flex items-center gap-2">
      <p-checkbox
        [ngModel]="wizardData().schedulingRequired"
        (ngModelChange)="onSchedulingRequiredChange($event)"
        [binary]="true"
        inputId="schedulingRequired"
        data-testid="scheduling-required-checkbox"
      />
      <label for="schedulingRequired" class="text-sm text-surface-700 dark:text-surface-300">
        Horario requerido
      </label>
    </div>

    <!-- Categorías del combo -->
    <div class="flex flex-col gap-1">
      <span class="text-sm font-medium text-surface-700 dark:text-surface-300">
        Categorías del combo
      </span>
      <div class="flex flex-wrap gap-2" data-testid="category-chips">
        @for (cat of ref.categories(); track cat.id) {
          <p-chip
            [label]="cat.name"
            [style]="isCategorySelected(cat.id) ? 'background: var(--p-primary-100); border: 1px solid var(--p-primary-300);' : 'background: var(--p-surface-100); border: 1px solid var(--p-surface-200);'"
            class="cursor-pointer"
            (click)="toggleCategory(cat.id)"
          />
        } @empty {
          <span class="text-sm text-surface-400 italic">Sin categorías</span>
        }
      </div>
    </div>

    <!-- Schedule editor -->
    @if (wizardData().schedulingRequired) {
      <div class="flex flex-col gap-4 border-t border-surface-200 dark:border-surface-700 pt-4" data-testid="schedule-editor">
        <div class="flex items-center justify-between">
          <span class="text-sm font-medium text-surface-700 dark:text-surface-300">
            Horario
          </span>
          <p-button
            label="Agregar horario"
            icon="pi pi-plus"
            size="small"
            (onClick)="addScheduleBlock()"
            data-testid="schedule-add-btn"
          />
        </div>

        @for (block of scheduleBlocksForDisplay(); track block.id) {
          <div class="flex flex-col gap-2 p-3 border border-surface-200 dark:border-surface-700 rounded-lg" data-testid="schedule-block">
            <div class="flex flex-wrap gap-2">
              @for (day of allDays; track day.value) {
                <p-chip
                  [label]="day.label"
                  [style]="isDayInBlock(block.id, day.value) ? 'background: var(--p-primary-100); border: 1px solid var(--p-primary-300);' : 'background: var(--p-surface-100); border: 1px solid var(--p-surface-200);'"
                  class="cursor-pointer"
                  (click)="toggleBlockDay(block.id, day.value)"
                />
              }
            </div>
            <div class="flex items-center gap-2">
              <p-datepicker
                [ngModel]="block.startTime"
                (ngModelChange)="onBlockStartTimeChange(block.id, $event)"
                [timeOnly]="true"
                hourFormat="24"
                [showIcon]="false"
                data-testid="schedule-start-time"
              />
              <span class="text-surface-400">-</span>
              <p-datepicker
                [ngModel]="block.endTime"
                (ngModelChange)="onBlockEndTimeChange(block.id, $event)"
                [timeOnly]="true"
                hourFormat="24"
                [showIcon]="false"
                data-testid="schedule-end-time"
              />
              <p-button
                icon="pi pi-trash"
                severity="danger"
                size="small"
                (onClick)="removeScheduleBlock(block.id)"
                data-testid="schedule-remove-btn"
              />
            </div>
          </div>
        }
      </div>
    }
  }
</div>
