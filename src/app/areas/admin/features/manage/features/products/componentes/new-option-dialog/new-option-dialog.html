<p-dialog [modal]="true" [(visible)]="visible"
  header="Nueva opción de producto"
  draggable="false" [style]="{ width: '48vw' }" appendTo="body">

  <form [formGroup]="newOptionForm" class="flex flex-col gap-4 pt-2">
    <p-iftalabel>
      <p-select [options]="optionCategories()" inputId="opt-category"
        optionValue="id" optionLabel="name" formControlName="optionCategoryId"
        placeholder="Seleccionar" class="w-full" appendTo="body"
        [invalid]="newOptionForm.get('optionCategoryId')?.invalid && !!newOptionForm.get('optionCategoryId')?.touched" />
      <label for="opt-category">Categoría de opción *</label>
    </p-iftalabel>

    <p-iftalabel>
      <input pInputText id="opt-name" class="w-full" formControlName="name"
        [invalid]="newOptionForm.get('name')?.invalid && !!newOptionForm.get('name')?.touched"
        autocomplete="off" />
      <label for="opt-name">Nombre de la opción *</label>
    </p-iftalabel>
  </form>

  <p-divider />
  <div class="flex items-center justify-between mb-3">
    <div>
      <span class="font-medium text-surface-800 dark:text-surface-200">Insumos de esta opción</span>
      <p class="text-xs text-surface-400 mt-0.5">Ingredientes que consume esta variante del inventario</p>
    </div>
    <p-button icon="pi pi-plus" label="Agregar insumo" [outlined]="true" size="small" (click)="addNewOptionRecipeItem()" />
  </div>

  @if (newOptionRecipe.length === 0) {
    <p class="text-sm text-surface-400 italic">Sin insumos — la opción no descuenta stock</p>
  }

  <div class="flex flex-col gap-2">
    @for (item of newOptionRecipe.controls; track $index; let i = $index) {
      <div [formGroup]="$any(item)" class="flex gap-2 items-end bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-surface-700 rounded-lg p-3">
        <div class="w-44">
          <span class="text-xs text-surface-500 mb-1 block">Categoría</span>
          <p-select [options]="supplyCategories()" optionLabel="name" optionValue="id"
            [ngModel]="getNewOptionRecipeCategory(i)" [ngModelOptions]="{ standalone: true }"
            (ngModelChange)="setNewOptionRecipeCategory(i, $event)"
            placeholder="Todas" [showClear]="true" class="w-full" appendTo="body" />
        </div>
        <div class="flex-1">
          <span class="text-xs text-surface-500 mb-1 block">Insumo *</span>
          <p-select [options]="filteredVariantsForNewOptionRecipe(i)" optionLabel="displayName" optionValue="id"
            formControlName="supplyVariantId" placeholder="Seleccionar insumo"
            class="w-full" [filter]="true" filterBy="displayName" appendTo="body" />
        </div>
        <div class="w-36">
          <span class="text-xs text-surface-500 mb-1 block">Cantidad *</span>
          <p-inputnumber formControlName="requiredQuantity" [min]="0.001"
            [minFractionDigits]="0" [maxFractionDigits]="3" class="w-full" />
        </div>
        <p-button icon="pi pi-trash" severity="danger" [text]="true" (click)="removeNewOptionRecipeItem(i)" />
      </div>
    }
  </div>

  <ng-template #footer>
    <p-button label="Cancelar" severity="secondary" icon="pi pi-times" (click)="close()" />
    <p-button label="Crear opción" icon="pi pi-check" [loading]="newOptionSubmitting()" (click)="submitNewOption()" />
  </ng-template>
</p-dialog>

<p-toast />
