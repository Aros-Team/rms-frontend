<div class="two-factor-container">
  <div class="two-factor-card">
    <div class="two-factor-header">
      <div class="two-factor-icon">
        <i class="pi pi-shield text-white text-2xl"></i>
      </div>
      <h1>Verificación en Dos Pasos</h1>
      <p class="two-factor-subtitle">Ingresa el código de 6 dígitos enviado a tu correo electrónico</p>
    </div>

    @if (errorMessage) {
      <div class="two-factor-error">
        <i class="pi pi-exclamation-circle two-factor-error-icon"></i>
        <span class="two-factor-error-text">{{ errorMessage }}</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="two-factor-form-field">
        <label for="code" class="two-factor-label">Código de Verificación</label>
        <input
          pInputText
          [invalid]="isInvalid('code')"
          id="code"
          type="text"
          formControlName="code"
          maxlength="6"
          placeholder="------"
          class="two-factor-code-input"
          inputmode="numeric"
          autocomplete="one-time-code"
        />
        @if (form.get('code')?.invalid && form.get('code')?.touched) {
          <small class="two-factor-error-small">Ingresa el código de 6 dígitos</small>
        }
      </div>

      <button
        pButton
        type="submit"
        aria-label="Verificar Código"
        class="w-full"
        [loading]="formStatus === 'Occuped'"
        [disabled]="formStatus === 'Occuped' || form.invalid"
      >Verificar Código</button>
    </form>

    <div class="two-factor-footer">
      <p class="two-factor-footer-text">¿No recibiste el código?</p>
      <button
        pButton
        type="button"
        aria-label="Volver al Login"
        class="p-button-text p-button-sm"
        (click)="goBack()"
      >Volver al Login</button>
    </div>

    <p class="two-factor-expire-note">El código expira en 5 minutos</p>
  </div>
</div>
