<div class="mx-auto my-8 flex flex-col gap-6" style="max-width: 400px;">
  <h1 class="text-xl font-bold mb-6 text-center text-surface">Recuperar Contraseña</h1>
   
  <div class="text-center mb-6">
    <p class="text-surface-600 dark:text-surface-400 text-sm">
      Ingresa tu correo electrónico y te enviaremos un enlace para recuperar tu contraseña.
    </p>
  </div>

  @if (success()) {
    <div class="mb-4">
      <p-message severity="success" text="Si el correo existe, recibirás un enlace de recuperación pronto."></p-message>
    </div>

    <p-button
      label="Volver al Login"
      class="mt-4 m-auto"
      (onClick)="goToLogin()">
    </p-button>
  } @else {
    @if (error()) {
      <div class="mb-4">
        <p-message severity="error" [text]="error()!"></p-message>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-8 mt-8">
      <div class="w-full">
        <label for="email" class="text-sm">Correo electrónico</label>
        <input
          pInputText
          id="email"
          type="email"
          formControlName="email"
          class="w-full"
          [invalid]="isInvalid('email')"
        />
        @if (isInvalid('email')) {
          <div class="text-red-500 text-sm">
            Campo requerido*
          </div>
        }
      </div>

      <p-button
        type="submit"
        class="mt-4 m-auto"
        [disabled]="form.invalid || loading()"
        [loading]="loading()"
      >
        @if (!loading()) {
          <span>Enviar Enlace</span>
        }
      </p-button>

      <div class="text-center mt-4">
        <a 
          href="javascript:void(0)" 
          (click)="goToLogin()"
          class="text-sm text-primary-500 hover:text-primary-600 dark:hover:text-primary-400"
        >
          Cancelar
        </a>
      </div>
    </form>
  }
</div>
