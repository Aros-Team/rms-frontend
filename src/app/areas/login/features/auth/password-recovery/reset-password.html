<div class="mx-auto my-8 flex flex-col gap-6" style="max-width: 400px;">
  <h1 class="text-xl font-bold mb-6 text-center text-surface">Restablecer Contraseña</h1>
  
  <div class="text-center mb-6">
    <p class="text-surface-600 dark:text-surface-400 text-sm">
      Ingresa tu nueva contraseña.
    </p>
  </div>

  @if (success()) {
    <div class="mb-4">
      <p-message severity="success" text="Tu contraseña ha sido restablecida correctamente."></p-message>
    </div>

    <button
      pButton
      label="Ir al Login"
      class="mt-4 m-auto"
      (click)="goToLogin()">
    </button>
  } @else {
    @if (error()) {
      <div class="mb-4">
        <p-message severity="error" [text]="error()!"></p-message>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 mt-8">
      <div class="w-full">
        <label for="newPassword" class="text-sm">Nueva Contraseña</label>
        <p-password
          id="newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="Ingresa la nueva contraseña"
          styleClass="w-full"
        />
      </div>

      <div class="w-full">
        <label for="confirmPassword" class="text-sm">Confirmar Nueva Contraseña</label>
        <p-password
          id="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="Confirma la nueva contraseña"
          styleClass="w-full"
        />
      </div>

      <div class="password-requirements">
        <h4>Requisitos de contraseña:</h4>
        <ul>
          <li [class.valid]="checkPasswordRequirement('minLength')">
            <i class="pi" [ngClass]="checkPasswordRequirement('minLength') ? 'pi-check' : 'pi-times'"></i>
            Mínimo 8 caracteres
          </li>
          <li [class.valid]="checkPasswordRequirement('upperCase')">
            <i class="pi" [ngClass]="checkPasswordRequirement('upperCase') ? 'pi-check' : 'pi-times'"></i>
            Al menos 1 mayúscula
          </li>
          <li [class.valid]="checkPasswordRequirement('lowerCase')">
            <i class="pi" [ngClass]="checkPasswordRequirement('lowerCase') ? 'pi-check' : 'pi-times'"></i>
            Al menos 1 minúscula
          </li>
          <li [class.valid]="checkPasswordRequirement('number')">
            <i class="pi" [ngClass]="checkPasswordRequirement('number') ? 'pi-check' : 'pi-times'"></i>
            Al menos 1 número
          </li>
          <li [class.valid]="checkPasswordRequirement('symbol')">
            <i class="pi" [ngClass]="checkPasswordRequirement('symbol') ? 'pi-check' : 'pi-times'"></i>
            Al menos 1 símbolo (@$!%*?&)
          </li>
        </ul>
      </div>

      <div class="flex flex-col gap-3 items-center">
        <button
          pButton
          type="submit"
          label="Cambiar Contraseña"
          class="w-full"
          [loading]="loading()"
          [disabled]="form.invalid">
        </button>
        <button
          pButton
          type="button"
          label="Cancelar"
          class="p-button-outlined w-full"
          (click)="goToLogin()">
        </button>
      </div>
    </form>
  }
</div>
