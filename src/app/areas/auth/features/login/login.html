
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5" style="width: 100%;">
  <!-- Email -->
  <div class="flex flex-col gap-1.5">
    <label for="username" class="text-sm font-medium text-surface-700">Correo electrónico</label>
    <div class="relative">
      <i class="pi pi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-surface-400 text-sm z-10"></i>
      <input
        pInputText
        id="username"
        type="email"
        formControlName="username"
        [invalid]="isInvalid('username')"
        placeholder="usuario@dominio.com"
        style="width: 100%; padding-left: 2.5rem;"
      />
    </div>
    @if (isInvalid('username')) {
      <small class="text-red-500">Campo requerido</small>
    }
  </div>

  <!-- Password -->
  <div class="flex flex-col gap-1.5">
    <label for="password" class="text-sm text-surface-700">Contraseña</label>
    <p-password
      id="password"
      formControlName="password"
      [invalid]="isInvalid('password')"
      [feedback]="false"
      [toggleMask]="true"
      placeholder="••••••••"
      fluid
      ariaLabel="Contraseña"
    />
    @if (isInvalid('password')) {
      <small class="text-red-500">Campo requerido</small>
    }
  </div>

  <!-- Terms Checkbox + Forgot password -->
  <div class="flex items-center justify-between gap-2 -mt-1">
    <div class="flex items-center gap-2">
      <p-checkbox
        formControlName="termsAccepted"
        [binary]="true"
        inputId="terms"
      />
      <label for="terms" class="text-sm text-surface-600 cursor-pointer">
        Acepto los
        <button
          type="button"
          (click)="showHabeasData()"
          (keydown.enter)="showHabeasData()"
          class="underline cursor-pointer bg-transparent border-none p-0 text-sm"
        >
          términos y condiciones
        </button>
      </label>
    </div>
    <a
      [routerLink]="['/forgot-password']"
      class="text-sm underline whitespace-nowrap"
    >
      ¿Olvidaste tu contraseña?
    </a>
  </div>

  <!-- Submit -->
  <p-button
    type="submit"
    class="mt-2"
    [disabled]="formStatus() === 'Occuped' || form.invalid"
    [loading]="formStatus() === 'Occuped'"
    styleClass="w-full justify-center gap-2"
  >
    @if (formStatus() === 'Free') {
      <span class="flex items-center gap-2">
        Entrar al sistema
        <i class="pi pi-arrow-right"></i>
      </span>
    }
    @if (formStatus() === 'Occuped') {
      <span>Autenticando...</span>
    }
  </p-button>

  <!-- Restricted Access Note -->
  <div class="mt-8 pt-4 border-t border-surface-200">
    <p class="text-center text-xs text-surface-600">Acceso restringido a personal autorizado</p>
  </div>
</form>
