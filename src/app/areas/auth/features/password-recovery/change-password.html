<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="true"
  header="Cambiar Contraseña"
  [style]="{ width: '450px' }"
  (onHide)="onDialogHide()"
>
  <div class="flex flex-col gap-4">
    @if (success()) {
      <p-message severity="success" text="Contraseña actualizada correctamente"></p-message>
    }

    @if (error()) {
      <p-message severity="error" [text]="error()!"></p-message>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div>
        <label for="currentPassword" class="block text-sm font-medium mb-2">Contraseña Actual</label>
        <p-password
          id="currentPassword"
          formControlName="currentPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Ingresa tu contraseña actual"
        ></p-password>
      </div>

      <div>
        <label for="newPassword" class="block text-sm font-medium mb-2">Nueva Contraseña</label>
        <p-password
          id="newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Ingresa la nueva contraseña"
        ></p-password>
      </div>

      <div>
        <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirmar Nueva Contraseña</label>
        <p-password
          id="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Confirma la nueva contraseña"
        ></p-password>
      </div>

      <!-- Password requirements -->
      <div class="p-3 bg-surface-50 dark:bg-surface-800 rounded-lg border border-surface-200 dark:border-surface-700">
        <h4 class="text-sm font-medium mb-2">Requisitos de contraseña:</h4>
        <ul class="list-none p-0 m-0 flex flex-col gap-1">
          <li class="text-sm flex items-center gap-2" [class.text-green-600]="checkPasswordRequirement('minLength')" [class.text-surface-500]="!checkPasswordRequirement('minLength')">
            <i class="pi text-xs" [ngClass]="checkPasswordRequirement('minLength') ? 'pi-check-circle' : 'pi-circle'"></i>
            Mínimo 8 caracteres
          </li>
          <li class="text-sm flex items-center gap-2" [class.text-green-600]="checkPasswordRequirement('upperCase')" [class.text-surface-500]="!checkPasswordRequirement('upperCase')">
            <i class="pi text-xs" [ngClass]="checkPasswordRequirement('upperCase') ? 'pi-check-circle' : 'pi-circle'"></i>
            Al menos 1 mayúscula
          </li>
          <li class="text-sm flex items-center gap-2" [class.text-green-600]="checkPasswordRequirement('lowerCase')" [class.text-surface-500]="!checkPasswordRequirement('lowerCase')">
            <i class="pi text-xs" [ngClass]="checkPasswordRequirement('lowerCase') ? 'pi-check-circle' : 'pi-circle'"></i>
            Al menos 1 minúscula
          </li>
          <li class="text-sm flex items-center gap-2" [class.text-green-600]="checkPasswordRequirement('number')" [class.text-surface-500]="!checkPasswordRequirement('number')">
            <i class="pi text-xs" [ngClass]="checkPasswordRequirement('number') ? 'pi-check-circle' : 'pi-circle'"></i>
            Al menos 1 número
          </li>
          <li class="text-sm flex items-center gap-2" [class.text-green-600]="checkPasswordRequirement('symbol')" [class.text-surface-500]="!checkPasswordRequirement('symbol')">
            <i class="pi text-xs" [ngClass]="checkPasswordRequirement('symbol') ? 'pi-check-circle' : 'pi-circle'"></i>
            Al menos 1 símbolo (@$!%*?&)
          </li>
        </ul>
      </div>
    </form>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex gap-2 justify-end">
      <p-button label="Cancelar" severity="secondary" (onClick)="closeDialog()"></p-button>
      <p-button label="Cambiar Contraseña" (onClick)="onSubmit()" [loading]="loading()" [disabled]="form.invalid"></p-button>
    </div>
  </ng-template>
</p-dialog>
