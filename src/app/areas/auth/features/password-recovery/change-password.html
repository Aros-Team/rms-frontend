<div class="bg-white dark:bg-surface-800 rounded-xl p-6 shadow-sm border border-surface-200 dark:border-surface-700">
  <h2 class="text-lg font-semibold text-surface-900 dark:text-surface-100 mb-4">
    Cambiar Contraseña
  </h2>

  @if (success()) {
    <p-message severity="success" text="Contraseña actualizada correctamente"></p-message>
  }

  @if (error()) {
    <p-message severity="error" [text]="error()!" class="mb-4"></p-message>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-4">
      <label for="currentPassword" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
        Contraseña Actual
      </label>
      <p-password
        id="currentPassword"
        formControlName="currentPassword"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        placeholder="Ingresa tu contraseña actual"
        ariaLabel="Contraseña actual"
      ></p-password>
    </div>

    <div class="mb-4">
      <label for="newPassword" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
        Nueva Contraseña
      </label>
      <p-password
        id="newPassword"
        formControlName="newPassword"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        placeholder="Ingresa la nueva contraseña"
        ariaLabel="Nueva contraseña"
      ></p-password>
    </div>

    <div class="mb-4">
      <label for="confirmPassword" class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-2">
        Confirmar Nueva Contraseña
      </label>
      <p-password
        id="confirmPassword"
        formControlName="confirmPassword"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        placeholder="Confirma la nueva contraseña"
        ariaLabel="Confirmar contraseña"
      ></p-password>
    </div>

    <div class="password-requirements">
      <h4>Requisitos de contraseña:</h4>
      <ul>
        <li [class.valid]="checkPasswordRequirement('minLength')">
          <i class="pi" [ngClass]="checkPasswordRequirement('minLength') ? 'pi-check' : 'pi-times'"></i>
          Mínimo 8 caracteres
        </li>
        <li [class.valid]="checkPasswordRequirement('upperCase')">
          <i class="pi" [ngClass]="checkPasswordRequirement('upperCase') ? 'pi-check' : 'pi-times'"></i>
          Al menos 1 mayúscula
        </li>
        <li [class.valid]="checkPasswordRequirement('lowerCase')">
          <i class="pi" [ngClass]="checkPasswordRequirement('lowerCase') ? 'pi-check' : 'pi-times'"></i>
          Al menos 1 minúscula
        </li>
        <li [class.valid]="checkPasswordRequirement('number')">
          <i class="pi" [ngClass]="checkPasswordRequirement('number') ? 'pi-check' : 'pi-times'"></i>
          Al menos 1 número
        </li>
        <li [class.valid]="checkPasswordRequirement('symbol')">
          <i class="pi" [ngClass]="checkPasswordRequirement('symbol') ? 'pi-check' : 'pi-times'"></i>
          Al menos 1 símbolo (@$!%*?&)
        </li>
      </ul>
    </div>

    <div class="flex gap-3">
      <button 
        pButton 
        type="submit"
        aria-label="Cambiar Contraseña"
        [loading]="loading()"
        [disabled]="form.invalid || loading()"
      >Cambiar Contraseña</button>
    </div>
  </form>
</div>
