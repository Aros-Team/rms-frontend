<div class="h-screen bg-surface-50 dark:bg-surface-900 flex flex-col">
  <app-header
    [isMobile]="isMobile"
    [role]="role"
    [workerType]="workerType"
    [isChatOpen]="isChatOpen"
    (toggleMenu)="toggleSidebar()"
    (toggleChat)="toggleChatEvent.emit()">
  </app-header>

  <app-restricted-banner />

  <div class="flex min-h-[100vh] min-w-[100%] overflow-hidden relative">
    <main
      class="flex-1 mb-[0.5rem] lg:mb-[1rem] mt-17 h-[strech] border rounded-lg md:rounded-2xl border-surface-300 dark:border-surface-700 flex flex-col"
      [ngClass]="{
        'ml-0.5 md:ml-2 mr-0.5 md:mr-2 lg:mr-[1rem]': !hideSidebar,
        'mx-auto px-4 max-w-7xl w-full': hideSidebar
      }">

      <div class="flex-1 min-h-0 overflow-y-auto p-1 md:p-2 lg:p-3">
        <ng-content></ng-content>
      </div>
    </main>

    @if (!hideSidebar && !isTablet) {
      <app-sidebar [visible]="sidebarVisible" [isMobile]="isMobile" (visibleChange)="onSidebarVisibleChange($event)">
      </app-sidebar>
    }
  </div>

  <app-accessibility></app-accessibility>
</div>
