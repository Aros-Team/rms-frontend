<div class="h-screen bg-surface-50 dark:bg-surface-900 overflow-clip">
  <!-- Header -->
  <app-header
    [horizontalMenuOptions]="horizontalMenuOptions"
    [isMobile]="isMobile"
    (toggleMenu)="toggleSidebar()">
  </app-header>

  <!-- Main Layout Container -->
  <div class="flex pt-16 h-[100vh] min-w-0">
    <!-- Sidebar -->
    @if (!hideSidebar) {
    <app-sidebar [visible]="sidebarVisible" [isMobile]="isMobile" (visibleChange)="onSidebarVisibleChange($event)">
    </app-sidebar>
    }

    <!-- Main Content Area -->
    <main
      class="flex-1 ml-2 md:ml-4 mb-2 md:mb-3 w-full min-w-0 transition-all duration-300 ease-in-out border rounded-xl md:rounded-2xl border-surface-300 dark:border-surface-700 mr-2 md:mr-4 overflow-hidden"
      [class]="{
        'md:mr-80': !isMobile && !hideSidebar
      }">

      <!-- Content Container -->
      <div class="w-full h-full p-4 lg:p-6 min-w-0">
        <article class="h-full w-full overflow-auto min-w-0">
          <ng-content></ng-content>
        </article>
      </div>
    </main>
  </div>
</div>
