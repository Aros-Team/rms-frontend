<div class="h-screen bg-surface-50 dark:bg-surface-900 flex flex-col">
  <app-header
    [isMobile]="isMobile"
    [role]="role"
    [isChatOpen]="isChatOpen"
    (toggleMenu)="toggleSidebar()"
    (toggleChat)="toggleChat()">
  </app-header>

  <div class="flex flex-1 min-h-0 overflow-hidden relative">
    <main
      class="flex-1 ml-0.5 md:ml-2 mb-0.5 md:mb-1 mr-0.5 md:mr-2 lg:mr-[100px] mt-16 w-full min-w-0 border rounded-lg md:rounded-2xl border-surface-300 dark:border-surface-700 flex flex-col">

      <div class="flex-1 min-h-0 overflow-y-auto p-1 md:p-2 lg:p-3">
        <ng-content></ng-content>
      </div>
    </main>

    @if (!hideSidebar && !isTablet) {
      <app-sidebar [visible]="sidebarVisible" [isMobile]="isMobile" (visibleChange)="onSidebarVisibleChange($event)">
      </app-sidebar>
    }
  </div>

  @if (role === 'ADMIN') {
  <app-chat></app-chat>
  }

  <app-accessibility></app-accessibility>
</div>
