<div class="rms-textarea-wrapper">
  @if (config().label) {
    <label [for]="config().id" class="rms-textarea-label">
      {{ config().label }}
      @if (config().required) {
        <span class="rms-textarea-required">*</span>
      }
    </label>
  }

  <textarea
    pTextarea
    [id]="config().id"
    [placeholder]="config().placeholder || ''"
    [rows]="config().rows"
    [cols]="config().cols"
    [autoResize]="config().autoResize"
    [disabled]="config().disabled"
    [readonly]="config().readonly"
    [attr.aria-required]="config().required"
    [attr.aria-invalid]="hasError()"
    class="rms-textarea-field"
    [class.rms-textarea-error]="hasError()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  ></textarea>

  @if (config().hint && !hasError()) {
    <small class="rms-textarea-hint">{{ config().hint }}</small>
  }

  @if (hasError() && config().errorMessage) {
    <small class="rms-textarea-error-msg">{{ config().errorMessage }}</small>
  }
</div>
