<div class="rms-input-wrapper">
  @if (options().label) {
    <label [for]="options().id" class="rms-input-label">
      {{ options().label }}
      @if (options().required) {
        <span class="rms-input-required">*</span>
      }
    </label>
  }
  
  <input
    [id]="options().id"
    [type]="options().type"
    [placeholder]="options().placeholder || ''"
    [disabled]="options().disabled"
    [readonly]="options().readonly"
    [attr.aria-required]="options().required"
    [attr.aria-invalid]="hasError()"
    class="rms-input-field"
    [class.rms-input-error]="hasError()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />

  @if (options().hint && !hasError()) {
    <small class="rms-input-hint">{{ options().hint }}</small>
  }

  @if (hasError() && options().errorMessage) {
    <small class="rms-input-error-msg">{{ options().errorMessage }}</small>
  }
</div>
