<div class="rms-empty-state">
  @if (config().icon) {
    <i [class]="config().icon"></i>
  }
  <h3>{{ config().title }}</h3>
  @if (config().message) {
    <p>{{ config().message }}</p>
  }
  @if (config().actionLabel) {
    <rms-button
      [label]="config().actionLabel"
      [icon]="config().actionIcon"
      (onClick)="onAction.emit()"
    />
  }
</div>
