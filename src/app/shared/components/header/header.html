<header
  class="fixed top-0 left-0 flex justify-between items-center h-16 px-4 bg-surface-50 dark:bg-surface-900 w-full max-w-full overflow-hidden z-10"
  [ngClass]="{
    'z-50': isMobile
  }">
  <!-- Left Section: Logo and Current Selection -->
  <section class="flex items-center gap-4">
    <!-- Logo -->
    <h1 class="flex items-center text-primary-500 font-black text-[1.5rem]">
      <app-logo [size]="45"></app-logo><span class="max-md:hidden">AROS</span>
    </h1>
    <span class="font-bold bg-primary-500 py-1 px-2.5 rounded-md text-primary-contrast">{{customer}}</span>


    <!-- Current Selection Display -->
    @if (selectedMenuItem) {
    <div class=" hidden md:flex items-center gap-2 ml-4 pl-4 border-l border-surface-200 dark:border-surface-700">
      @if (selectedMenuItem.icon) {
      <i [class]="selectedMenuItem.icon + ' text-surface-500 dark:text-surface-400'"></i>
      }
      <span class="text-surface-700 dark:text-surface-300 font-medium">
        {{ selectedMenuItem.description }}
      </span>
    </div>
    }
  </section>

  <!-- Right Section: Menu Toggle, Accessibility and Logout -->
  <section class="flex items-center gap-4">
    <!-- Menu Toggle Button (Mobile) -->
    <button class="lg:hidden p-2 rounded-lg hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
      (click)="toggleMenu.emit()" aria-label="Abrir menú">
      <i class="pi pi-bars text-surface-600 dark:text-surface-400"></i>
    </button>

    <!-- Accessibility Button -->
    <app-accessibility></app-accessibility>

    <!-- Logout Button -->
    <button class="p-2 rounded-lg hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors cursor-pointer"
      (click)="onLogout()" aria-label="Cerrar sesión" title="Cerrar sesión">
      <i class="pi pi-sign-out text-surface-600 dark:text-surface-400"></i>
    </button>
  </section>
</header>

<!-- Logout Confirmation Dialog -->
<p-dialog 
  [(visible)]="showLogoutDialog" 
  [modal]="true" 
  [closable]="true"
  [closeOnEscape]="true"
  [draggable]="false"
  [resizable]="false"
  header="Cerrar Sesión"
  [style]="{width: '90vw', maxWidth: '400px'}"
>
  <div class="py-4">
    <div class="flex items-center gap-3">
      <i class="pi pi-exclamation-triangle text-yellow-500 text-2xl"></i>
      <p class="text-surface-700 dark:text-surface-300">
        ¿Estás seguro de que deseas cerrar sesión?
      </p>
    </div>
  </div>

  <div class="flex justify-end gap-2 mt-4">
    <p-button 
      label="Cancelar" 
      severity="secondary" 
      (onClick)="cancelLogout()"
    ></p-button>
    <p-button 
      label="Cerrar Sesión" 
      (onClick)="confirmLogout()"
    ></p-button>
  </div>
</p-dialog>
