<div class="current-date bg-surface-50 dark:bg-surface-800 rounded-lg">
  <p-datepicker
    [(ngModel)]="currentDate"
    [inline]="true"
    [readonlyInput]="true"
    [showIcon]="false"
    [showWeek]="false"
    [disabled]="true"
    [maxDate]="maxDate"
    [minDate]="minDate">
  </p-datepicker>
</div>
