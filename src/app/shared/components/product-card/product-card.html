@if (loading) {
  <div class="flex flex-col gap-2 w-full max-w-[180px]">
    <p-skeleton width="100%" height="100px" borderRadius="12px" />
    <p-skeleton width="80%" height="16px" />
    <p-skeleton width="60%" height="14px" />
  </div>
} @else {
  <div
    class="flex flex-col w-full border rounded-xl bg-primary-contrast overflow-hidden transition-colors"
    [class.border-surface-200]="!selected"
    [class.border-primary]="selected"
    [class.opacity-50]="disabled"
    [class.pointer-events-none]="disabled || unavailable"
    [class.cursor-pointer]="!disabled && !unavailable"
    (click)="onToggle()"
    (keydown.enter)="onToggle($event)"
    (keydown.space)="onToggle($event)"
    [tabindex]="disabled ? -1 : 0"
    role="option"
    [attr.aria-selected]="selected"
  >
    <div class="relative w-full aspect-[3/2] bg-surface-100">
      @if ($any(product)?.thumbnailUrl) {
        <img
          [src]="$any(product).thumbnailUrl"
          [alt]="product?.name ?? ''"
          class="w-full h-full object-cover"
          loading="lazy"
          (error)="$any($event.target).src = defaultImage"
        />
      } @else {
        <img
          [src]="defaultImage"
          [alt]="product?.name ?? ''"
          class="w-full h-full object-cover"
        />
      }

      @if (selected) {
        <div class="absolute inset-0 bg-primary/20 flex items-center justify-center">
          <i class="pi pi-check-circle text-primary text-2xl"></i>
        </div>
      }

      @if (unavailable) {
        <div class="absolute top-2 left-2 bg-surface-600 text-surface-0 text-xs font-bold px-2 py-0.5 rounded">
          No disponible
        </div>
      }
    </div>

    <div class="flex flex-col gap-1 p-2">
      <span class="text-xs sm:text-sm font-medium text-surface-900 truncate leading-tight">{{ product?.name }}</span>
      <span class="text-xs sm:text-sm font-semibold text-surface-600" [class.line-through]="unavailable">
        {{ product?.basePrice | currency:'USD':'symbol-narrow' }}
      </span>
    </div>
  </div>
}
