<aside
    class="lg:mt-[3.5rem] bg-surface-50 dark:bg-surface-900 flex flex-col
    fixed inset-0 w-full h-full z-[100] transition-transform duration-300 ease-in-out
    translate-x-full lg:translate-x-0
    lg:relative lg:inset-auto lg:h-full lg:z-auto lg:shrink-0 lg:w-[200px] lg:min-w-[200px]"
    [class.translate-x-0]="visible"
    [class.translate-x-full]="!visible">

    <div class="flex items-center justify-end p-4 lg:hidden">
        <button class="p-2 rounded-lg hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
            (click)="closeSidebar()" aria-label="Cerrar menú">
            <i class="pi pi-times text-surface-600 dark:text-surface-400 text-xl"></i>
        </button>
    </div>

    <nav class="flex-1 overflow-y-auto min-w-0">
        <ul class="p-2">
            @for (item of menuItems; track item.id) {
                <li class="block">
                    <a [routerLink]="item.routerLink"
                        routerLinkActive="!text-primary-500 font-semibold"
                        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
                        class="flex items-center gap-3 p-3 rounded-lg text-surface-700 dark:text-surface-300 hover:bg-surface-100 dark:hover:bg-surface-800 hover:pl-4 transition-all duration-200 cursor-pointer"
                        (click)="onMenuItemClick(item)">
                        @if (item.icon) {
                            <i [class]="item.icon + ''"></i>
                        }
                        <span class="font-medium break-words">{{ item.label }}</span>
                    </a>
                </li>
            }
        </ul>
    </nav>

</aside>
