server {
  listen 80;
  server_name _;

  # Security Headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Content Security Policy - allows self, inline styles (Tailwind), API connections
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.rms.aros.services https://abi.aros.services wss: https:; frame-ancestors 'none';" always;

  # HTTP Strict Transport Security - 1 year max-age with subdomains
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # XSS Protection (legacy but recommended for older browsers)
  add_header X-XSS-Protection "1; mode=block" always;

  # PWA MIME types
  types {
    application/manifest+json webmanifest;
  }

  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets for PWA
  location /icons/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /fonts/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Service worker - no cache
  location /ngsw-worker.js {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}
