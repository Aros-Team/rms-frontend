version: '3'

vars:
  DOCKER_IMAGE: spalaxdev/rms-frontend
  VERSION:
    sh: "node -e \"console.log(require('./package.json').version)\""

tasks:

  run:
    desc: Run app
    cmds:
      - npm run start

  test:
    desc: Run tests
    cmds:
      - npm run lint:check
      - npm test --

  format:
    desc: Fix code formatting
    cmds:
      - npm run lint --fix

  build:
    desc: Build and create Docker image
    cmds:
      - npm run build
      - docker build -t {{.DOCKER_IMAGE}}:{{.VERSION}} build/
